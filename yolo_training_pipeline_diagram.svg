<svg width="100%" viewBox="0 0 680 980" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>YOLOv8n PPE Detection — Two-Phase Training Pipeline</title>
  <desc>End-to-end training pipeline: Roboflow dataset → preprocessing → model selection → Phase 1 fine-tune → checkpoint transfer (best.pt) → client data labelling → Phase 2 fine-tune → evaluation → deployment</desc>

  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#9c9a92" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arr-transfer" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#f0ac3b" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="680" height="980" fill="#1a1a18" rx="14"/>

  <!-- ── STAGE 1: Data Source ── -->
  <rect x="40" y="30" width="600" height="64" rx="10" fill="#085041" stroke="#5dcaa5" stroke-width="0.75"/>
  <text x="340" y="53" text-anchor="middle" dominant-baseline="central" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="13" font-weight="600" fill="#9fe1cb">Data Source</text>
  <text x="340" y="74" text-anchor="middle" dominant-baseline="central" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="11" fill="#5dcaa5">Roboflow public dataset · 25-class PPE &amp; vehicle annotations</text>

  <!-- arrow -->
  <line x1="340" y1="94" x2="340" y2="118" stroke="#9c9a92" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ── STAGE 2: Preprocessing ── -->
  <rect x="40" y="120" width="600" height="64" rx="10" fill="#085041" stroke="#5dcaa5" stroke-width="0.75"/>
  <text x="340" y="143" text-anchor="middle" dominant-baseline="central" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="13" font-weight="600" fill="#9fe1cb">Preprocessing</text>
  <text x="340" y="164" text-anchor="middle" dominant-baseline="central" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="11" fill="#5dcaa5">Resize 640×640 · augment · normalise · YOLO label format</text>

  <!-- arrow -->
  <line x1="340" y1="184" x2="340" y2="208" stroke="#9c9a92" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ── STAGE 3: Model Selection ── -->
  <rect x="40" y="210" width="600" height="178" rx="10" fill="#3c3489" stroke="#afa9ec" stroke-width="0.75"/>
  <text x="340" y="232" text-anchor="middle" dominant-baseline="central" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="13" font-weight="600" fill="#cecbf6">Model Selection</text>
  <text x="340" y="250" text-anchor="middle" dominant-baseline="central" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="11" fill="#afa9ec">Benchmark on NVIDIA GeForce GTX 1650 · COCO pretrained weights</text>

  <!-- Table header -->
  <line x1="60" y1="264" x2="620" y2="264" stroke="#afa9ec" stroke-width="0.4" opacity="0.4"/>
  <text x="145" y="275" text-anchor="middle" dominant-baseline="central" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="11" font-weight="600" fill="#c2c0b6">Model</text>
  <text x="280" y="275" text-anchor="middle" dominant-baseline="central" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="11" font-weight="600" fill="#c2c0b6">Params</text>
  <text x="400" y="275" text-anchor="middle" dominant-baseline="central" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="11" font-weight="600" fill="#c2c0b6">Inference</text>
  <text x="530" y="275" text-anchor="middle" dominant-baseline="central" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="11" font-weight="600" fill="#c2c0b6">mAP@0.5</text>
  <line x1="60" y1="285" x2="620" y2="285" stroke="#afa9ec" stroke-width="0.4" opacity="0.4"/>

  <!-- Row 1 selected -->
  <rect x="60" y="286" width="560" height="26" rx="3" fill="#633806" stroke="#ef9f27" stroke-width="0.6" opacity="0.7"/>
  <text x="145" y="299" text-anchor="middle" dominant-baseline="central" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="11" fill="#c2c0b6">YOLOv8n ★</text>
  <text x="280" y="299" text-anchor="middle" dominant-baseline="central" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="11" fill="#c2c0b6">3.2 M</text>
  <text x="400" y="299" text-anchor="middle" dominant-baseline="central" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="11" fill="#c2c0b6">~22 ms</text>
  <text x="530" y="299" text-anchor="middle" dominant-baseline="central" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="11" fill="#c2c0b6">0.857</text>
  <!-- Row 2 -->
  <text x="145" y="325" text-anchor="middle" dominant-baseline="central" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="11" fill="#c2c0b6">YOLOv8s</text>
  <text x="280" y="325" text-anchor="middle" dominant-baseline="central" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="11" fill="#c2c0b6">11.2 M</text>
  <text x="400" y="325" text-anchor="middle" dominant-baseline="central" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="11" fill="#c2c0b6">~128 ms</text>
  <text x="530" y="325" text-anchor="middle" dominant-baseline="central" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="11" fill="#c2c0b6">0.943</text>
  <!-- Row 3 -->
  <text x="145" y="351" text-anchor="middle" dominant-baseline="central" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="11" fill="#c2c0b6">YOLOv9s</text>
  <text x="280" y="351" text-anchor="middle" dominant-baseline="central" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="11" fill="#c2c0b6">7.2 M</text>
  <text x="400" y="351" text-anchor="middle" dominant-baseline="central" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="11" fill="#c2c0b6">~116 ms</text>
  <text x="530" y="351" text-anchor="middle" dominant-baseline="central" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="11" fill="#c2c0b6">0.950</text>
  <!-- Row 4 -->
  <text x="145" y="377" text-anchor="middle" dominant-baseline="central" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="11" fill="#c2c0b6">YOLOv11s</text>
  <text x="280" y="377" text-anchor="middle" dominant-baseline="central" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="11" fill="#c2c0b6">9.4 M</text>
  <text x="400" y="377" text-anchor="middle" dominant-baseline="central" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="11" fill="#c2c0b6">~90 ms</text>
  <text x="530" y="377" text-anchor="middle" dominant-baseline="central" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="11" fill="#c2c0b6">0.950</text>
  <line x1="60" y1="388" x2="620" y2="388" stroke="#afa9ec" stroke-width="0.4" opacity="0.4"/>

  <!-- arrow -->
  <line x1="340" y1="388" x2="340" y2="412" stroke="#9c9a92" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ── STAGE 4: Phase 1 Training ── -->
  <rect x="40" y="414" width="600" height="64" rx="10" fill="#0c447c" stroke="#85b7eb" stroke-width="0.75"/>
  <text x="340" y="437" text-anchor="middle" dominant-baseline="central" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="13" font-weight="600" fill="#b5d4f4">Phase 1 — Roboflow Dataset Fine-Tune</text>
  <text x="340" y="458" text-anchor="middle" dominant-baseline="central" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="11" fill="#85b7eb">50 epochs · GTX 1650 · mAP@0.5 ≈ 0.838 · Precision ≈ 0.91 · Recall ≈ 0.76</text>

  <!-- ── CHECKPOINT TRANSFER INDICATOR ── -->
  <!-- Right-side label + dashed curved path -->
  <rect x="460" y="489" width="160" height="30" rx="6" fill="#3a2500" stroke="#f0ac3b" stroke-width="1" stroke-dasharray="4 2"/>
  <text x="540" y="504" text-anchor="middle" dominant-baseline="central" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="10" font-weight="600" fill="#f0ac3b">best.pt → Phase 2</text>
  <!-- Arrow from phase1 box right edge curving to phase2 box right edge -->
  <path d="M 640 446 Q 660 446 660 504 Q 660 562 640 562" fill="none" stroke="#f0ac3b" stroke-width="1.5" stroke-dasharray="5 3" marker-end="url(#arr-transfer)"/>

  <!-- arrow straight down -->
  <line x1="340" y1="478" x2="340" y2="502" stroke="#9c9a92" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ── STAGE 5: Client Dataset ── -->
  <rect x="40" y="504" width="600" height="64" rx="10" fill="#712b13" stroke="#f0997b" stroke-width="0.75"/>
  <text x="340" y="527" text-anchor="middle" dominant-baseline="central" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="13" font-weight="600" fill="#f5c4b3">Client Dataset Labelling</text>
  <text x="340" y="548" text-anchor="middle" dominant-baseline="central" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="11" fill="#f0997b">7 classes: Hardhat · Mask · NO-Hardhat · NO-Mask · NO-Safety Vest · Person · Safety Vest</text>

  <!-- arrow -->
  <line x1="340" y1="568" x2="340" y2="592" stroke="#9c9a92" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ── STAGE 6: Phase 2 Training ── -->
  <rect x="40" y="594" width="600" height="64" rx="10" fill="#0c447c" stroke="#85b7eb" stroke-width="0.75"/>
  <text x="340" y="617" text-anchor="middle" dominant-baseline="central" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="13" font-weight="600" fill="#b5d4f4">Phase 2 — Client Data Fine-Tune</text>
  <text x="340" y="638" text-anchor="middle" dominant-baseline="central" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="11" fill="#85b7eb">50 epochs · init from Phase 1 best.pt · mAP@0.5 ≈ 0.857 · Precision ≈ 0.93 · Recall ≈ 0.79</text>

  <!-- arrow -->
  <line x1="340" y1="658" x2="340" y2="682" stroke="#9c9a92" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ── STAGE 7: Evaluation ── -->
  <rect x="40" y="684" width="600" height="64" rx="10" fill="#3c3489" stroke="#afa9ec" stroke-width="0.75"/>
  <text x="340" y="707" text-anchor="middle" dominant-baseline="central" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="13" font-weight="600" fill="#cecbf6">Evaluation</text>
  <text x="340" y="728" text-anchor="middle" dominant-baseline="central" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="11" fill="#afa9ec">Precision · Recall · mAP@0.5 · mAP@0.5-0.95 · F1 curve · confusion matrix</text>

  <!-- ── Phase comparison table ── -->
  <rect x="40" y="760" width="600" height="110" rx="10" fill="#222220" stroke="#4a4a47" stroke-width="0.75"/>
  <text x="340" y="780" text-anchor="middle" dominant-baseline="central" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="12" font-weight="600" fill="#c2c0b6">Phase 1 → Phase 2 Improvement</text>
  <!-- table header -->
  <line x1="60" y1="792" x2="620" y2="792" stroke="#4a4a47" stroke-width="0.5"/>
  <text x="160" y="803" text-anchor="middle" dominant-baseline="central" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="10" font-weight="600" fill="#9c9a92">Metric</text>
  <text x="340" y="803" text-anchor="middle" dominant-baseline="central" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="10" font-weight="600" fill="#85b7eb">Phase 1 (Roboflow)</text>
  <text x="490" y="803" text-anchor="middle" dominant-baseline="central" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="10" font-weight="600" fill="#f0997b">Phase 2 (Client)</text>
  <text x="590" y="803" text-anchor="middle" dominant-baseline="central" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="10" font-weight="600" fill="#5dcaa5">Δ</text>
  <line x1="60" y1="812" x2="620" y2="812" stroke="#4a4a47" stroke-width="0.5"/>
  <!-- rows -->
  <text x="160" y="824" text-anchor="middle" dominant-baseline="central" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="10" fill="#c2c0b6">mAP@0.5</text>
  <text x="340" y="824" text-anchor="middle" dominant-baseline="central" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="10" fill="#85b7eb">~0.838</text>
  <text x="490" y="824" text-anchor="middle" dominant-baseline="central" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="10" fill="#f0997b">~0.857</text>
  <text x="590" y="824" text-anchor="middle" dominant-baseline="central" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="10" fill="#5dcaa5">+0.019</text>

  <text x="160" y="840" text-anchor="middle" dominant-baseline="central" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="10" fill="#c2c0b6">mAP@0.5-0.95</text>
  <text x="340" y="840" text-anchor="middle" dominant-baseline="central" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="10" fill="#85b7eb">~0.527</text>
  <text x="490" y="840" text-anchor="middle" dominant-baseline="central" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="10" fill="#f0997b">~0.549</text>
  <text x="590" y="840" text-anchor="middle" dominant-baseline="central" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="10" fill="#5dcaa5">+0.022</text>

  <text x="160" y="856" text-anchor="middle" dominant-baseline="central" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="10" fill="#c2c0b6">Precision</text>
  <text x="340" y="856" text-anchor="middle" dominant-baseline="central" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="10" fill="#85b7eb">~0.91</text>
  <text x="490" y="856" text-anchor="middle" dominant-baseline="central" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="10" fill="#f0997b">~0.93</text>
  <text x="590" y="856" text-anchor="middle" dominant-baseline="central" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="10" fill="#5dcaa5">+0.02</text>

  <text x="160" y="872" text-anchor="middle" dominant-baseline="central" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="10" fill="#c2c0b6">Recall</text>
  <text x="340" y="872" text-anchor="middle" dominant-baseline="central" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="10" fill="#85b7eb">~0.76</text>
  <text x="490" y="872" text-anchor="middle" dominant-baseline="central" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="10" fill="#f0997b">~0.79</text>
  <text x="590" y="872" text-anchor="middle" dominant-baseline="central" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="10" fill="#5dcaa5">+0.03</text>

  <!-- arrow -->
  <line x1="340" y1="870" x2="340" y2="894" stroke="#9c9a92" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ── STAGE 8: Export / Deploy ── -->
  <rect x="40" y="896" width="600" height="64" rx="10" fill="#444441" stroke="#b4b2a9" stroke-width="0.75"/>
  <text x="340" y="919" text-anchor="middle" dominant-baseline="central" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="13" font-weight="600" fill="#d3d1c7">Export &amp; Deploy</text>
  <text x="340" y="940" text-anchor="middle" dominant-baseline="central" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="11" fill="#b4b2a9">best.pt (Phase 2) · ONNX / TensorRT / TFLite · Inference API</text>

  <!-- Legend -->
  <rect x="40" y="972" width="10" height="10" rx="2" fill="#085041" stroke="#5dcaa5" stroke-width="0.5"/>
  <text x="56" y="977" dominant-baseline="central" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="10" fill="#c2c0b6">Data</text>
  <rect x="100" y="972" width="10" height="10" rx="2" fill="#0c447c" stroke="#85b7eb" stroke-width="0.5"/>
  <text x="116" y="977" dominant-baseline="central" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="10" fill="#c2c0b6">Training</text>
  <rect x="178" y="972" width="10" height="10" rx="2" fill="#3c3489" stroke="#afa9ec" stroke-width="0.5"/>
  <text x="194" y="977" dominant-baseline="central" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="10" fill="#c2c0b6">Selection / Eval</text>
  <rect x="290" y="972" width="10" height="10" rx="2" fill="#712b13" stroke="#f0997b" stroke-width="0.5"/>
  <text x="306" y="977" dominant-baseline="central" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="10" fill="#c2c0b6">Client Data</text>
  <rect x="380" y="972" width="10" height="10" rx="2" fill="#444441" stroke="#b4b2a9" stroke-width="0.5"/>
  <text x="396" y="977" dominant-baseline="central" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="10" fill="#c2c0b6">Deployment</text>
  <!-- checkpoint transfer legend -->
  <line x1="464" y1="977" x2="490" y2="977" stroke="#f0ac3b" stroke-width="1.5" stroke-dasharray="4 2"/>
  <text x="496" y="977" dominant-baseline="central" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="10" fill="#f0ac3b">Checkpoint Transfer</text>
</svg>
